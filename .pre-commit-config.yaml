# Pre-commit configuration - Pattern MemOS (11 hooks quality)
# Run: pre-commit install && pre-commit run --all-files

repos:
  # Standard pre-commit hooks (quality checks)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of files
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-case-conflict
        name: Check for case conflicts
      - id: check-json
        name: Validate JSON files
      - id: check-toml
        name: Validate TOML files
      - id: check-yaml
        name: Validate YAML files
      - id: pretty-format-json
        name: Format JSON files
        args: [--autofix, --indent, "2"]
        exclude: ^(\.vscode/|\.specify/)
      - id: check-ast
        name: Check Python AST validity
      - id: debug-statements
        name: Check for debug statements
      - id: check-docstring-first
        name: Check docstring is first

  # Ruff linter + formatter (fast Python linting)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.8
    hooks:
      - id: ruff
        name: Ruff linter
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: Ruff formatter

  # Optional type hints enforcement (PEP 484)
  - repo: https://github.com/KengoTODA/optional-type-hints
    rev: "1.4"
    hooks:
      - id: no_implicit_optional
        name: No implicit optional types

# Ruff configuration (inline)
# See also: pyproject.toml [tool.ruff] section
